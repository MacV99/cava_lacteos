services:
  - type: web
    name: cava-chatbot-instagram
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: IG_VERIFY_TOKEN
        sync: false
      - key: IG_PAGE_ACCESS_TOKEN
        sync: false
      - key: IG_APP_SECRET
        sync: false
